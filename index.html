<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo</title>
    <style>
        :root {
            --bg: #f4f5f7;
            --card: #ffffff;
            --text: #1f2328;
            --muted: #8a919b;
            --border: #e4e6ea;
            --accent: #6c5ce7;
            --accent-hover: #5a4bd4;
            --danger: #e74c3c;
        }
        * {
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 3rem 1rem;
            background: var(--bg);
            color: var(--text);
        }
        .app {
            width: 100%;
            max-width: 480px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.06);
            overflow: hidden;
        }
        header {
            padding: 1.75rem 1.75rem 1.25rem;
            border-bottom: 1px solid var(--border);
        }
        header h1 {
            margin: 0;
            font-size: 1.6rem;
            font-weight: 700;
        }
        header p {
            margin: 0.35rem 0 0;
            color: var(--muted);
            font-size: 0.95rem;
        }
        .input-row {
            display: flex;
            gap: 0.5rem;
            padding: 1.25rem 1.75rem;
        }
        #new-todo {
            flex: 1;
            padding: 0.65rem 0.85rem;
            font-size: 1rem;
            border: 1px solid var(--border);
            border-radius: 8px;
            outline: none;
            background: var(--bg);
        }
        #new-todo:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(108, 92, 231, 0.15);
            background: var(--card);
        }
        #add-btn {
            padding: 0.65rem 1.1rem;
            font-size: 1rem;
            font-weight: 600;
            color: white;
            background: var(--accent);
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.15s;
        }
        #add-btn:hover {
            background: var(--accent-hover);
        }
        ul {
            list-style: none;
            margin: 0;
            padding: 0;
            min-height: 60px;
        }
        li {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem 1.75rem;
            border-top: 1px solid var(--border);
        }
        li input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: var(--accent);
            cursor: pointer;
        }
        li .text {
            flex: 1;
            font-size: 1rem;
        }
        li.done .text {
            text-decoration: line-through;
            color: var(--muted);
        }
        li .delete {
            background: none;
            border: none;
            color: var(--danger);
            font-size: 1.2rem;
            cursor: pointer;
            opacity: 0.55;
            line-height: 1;
        }
        li .delete:hover {
            opacity: 1;
        }
        .empty {
            text-align: center;
            color: var(--muted);
            padding: 1.5rem;
            font-style: italic;
        }
        footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 1.75rem;
            font-size: 0.85rem;
            color: var(--muted);
            border-top: 1px solid var(--border);
        }
        #clear-btn {
            background: none;
            border: none;
            color: var(--accent);
            cursor: pointer;
            font-size: 0.85rem;
        }
        #clear-btn:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="app">
        <header>
            <h1>Todo</h1>
            <p>A simple list to keep you on track</p>
        </header>
        <div class="input-row">
            <input id="new-todo" type="text" placeholder="What needs doing?" autocomplete="off">
            <button id="add-btn">Add</button>
        </div>
        <ul id="list"></ul>
        <footer>
            <span id="count">0 items left</span>
            <button id="clear-btn">Clear completed</button>
        </footer>
    </div>

    <script>
        const todos = [
            { text: "Buy groceries", done: true },
            { text: "Write the todo app", done: false },
            { text: "Take a break", done: false },
        ];

        const list = document.getElementById("list");
        const input = document.getElementById("new-todo");
        const count = document.getElementById("count");

        function render() {
            list.innerHTML = "";
            if (todos.length === 0) {
                const empty = document.createElement("li");
                empty.className = "empty";
                empty.textContent = "Nothing here — add a task above.";
                list.appendChild(empty);
            }
            todos.forEach((todo, i) => {
                const li = document.createElement("li");
                if (todo.done) li.classList.add("done");

                const cb = document.createElement("input");
                cb.type = "checkbox";
                cb.checked = todo.done;
                cb.addEventListener("change", () => {
                    todo.done = cb.checked;
                    render();
                });

                const span = document.createElement("span");
                span.className = "text";
                span.textContent = todo.text;

                const del = document.createElement("button");
                del.className = "delete";
                del.innerHTML = "&times;";
                del.title = "Delete";
                del.addEventListener("click", () => {
                    todos.splice(i, 1);
                    render();
                });

                li.append(cb, span, del);
                list.appendChild(li);
            });

            const left = todos.filter(t => !t.done).length;
            count.textContent = `${left} item${left === 1 ? "" : "s"} left`;
        }

        function addTodo() {
            const text = input.value.trim();
            if (!text) return;
            todos.push({ text, done: false });
            input.value = "";
            input.focus();
            render();
        }

        document.getElementById("add-btn").addEventListener("click", addTodo);
        input.addEventListener("keydown", (e) => {
            if (e.key === "Enter") addTodo();
        });
        document.getElementById("clear-btn").addEventListener("click", () => {
            for (let i = todos.length - 1; i >= 0; i--) {
                if (todos[i].done) todos.splice(i, 1);
            }
            render();
        });

        render();
    </script>
</body>
</html>
